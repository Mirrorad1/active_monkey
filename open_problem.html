<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "growth",
  "fontPair": "editorial",
  "gridPaper": true,
  "motion": true
}/*EDITMODE-END*/;

/* The article is authored as an HTML string so inline LaTeX braces (s_{1:T}, \text{…})
   never collide with JSX expression syntax. MathJax typesets it after mount. */
const ARTICLE = String.raw`
  <header class="op-head op">
    <div class="kicker slate">active_monkey · research note</div>
    <h1 class="h-display">The open problem, precisely.</h1>
    <p class="sub">Why a free-energy agent won't grow a concept — a "topic", a self, an opinion — on its own, and exactly where the mathematics stops.</p>
    <p class="note">The goal: a discrete active-inference agent that learns language and forms its own dispositions <em>from scratch</em>, never pre-trained on opinions. The experiments hit a wall whose shape is well-defined. This note states that wall in math.</p>
    <div class="op-toc">
      <a href="#model">The model</a>
      <a href="#o1">1 · Symmetric saddle</a>
      <a href="#o2">2 · Non-identifiability</a>
      <a href="#o3">3 · Chicken-and-egg</a>
      <a href="#binding">Long-range binding</a>
      <a href="#fixes">The fixes</a>
    </div>
  </header>

  <div class="op">
    <p class="op-lead">We are asking the model to discover, <strong>unsupervised</strong>, a latent variable it was never given — a "topic" / concept \(z\) — purely by minimizing free energy. That is the crux, and it is genuinely hard.</p>

    <h2 id="model"><span class="nm"></span>The model</h2>
    <p>A hierarchical active-inference model: a slow latent \(z\) (topic, near-identity dynamics so it persists), a fast latent \(s_t\) (character context), discrete emissions \(o_t\), with Dirichlet priors on the parameters \(A,B\):</p>
    <div class="eq">$$p(o_{1:T}, s_{1:T}, z, A, B) = p(z)\,p(A)\,p(B)\prod_{t} \underbrace{p(o_t \mid s_t; A)}_{\text{emission}}\;\underbrace{p(s_t \mid s_{t-1}, z; B)}_{\text{topic-conditioned transition}}$$</div>
    <p>We minimize variational free energy over a mean-field posterior \(q(z)\,q(s_{1:T})\,q(A)\,q(B)\):</p>
    <div class="eq">$$F = \mathbb{E}_q[\ln q - \ln p] = \underbrace{-\,\mathbb{E}_q[\ln p(o\mid s,A)]}_{\text{inaccuracy (surprise)}} + \underbrace{\mathrm{KL}[q\,\Vert\,p]}_{\text{complexity}}$$</div>
    <p class="eqcap">At the optimum the per-step free energy equals the predictive surprise — the bits/char the agent literally feels.</p>

    <div class="callout">
      <div class="tag">the open problem in one sentence</div>
      <p><strong>This objective has a dominant fixed point at which the latent \(z\) is useless — and nothing in the dynamics pushes the system off it.</strong> Three exact reasons, plus a separate long-range sub-problem.</p>
    </div>

    <h2 id="o1"><span class="nm">1</span>A symmetric saddle — no gradient to break the symmetry</h2>
    <p>If \(B\) is symmetric in \(z\) (all topics identical at initialization), then \(q(z{=}k)=1/K\) is stationary and the first-order force driving topics to specialize is <em>exactly zero</em>:</p>
    <div class="eq">$$\left.\frac{\partial F}{\partial(\text{topic differentiation})}\right|_{\text{symmetric}} = 0$$</div>
    <p>Worse, the entropy term inside \(F\) <em>actively smooths</em> any small fluctuation back toward uniform. Escaping requires a second-order fluctuation to be amplified — and mean-field damps exactly those.</p>
    <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 12</div><p><code>sky is → "s gree"</code> &nbsp; <code>grass is → "s gree"</code> &nbsp; topic belief stayed <code>[0.5, 0.5]</code> the entire run. The latent never differentiated.</p></div>

    <h2 id="o2"><span class="nm">2</span>Non-identifiability — and complexity <em>prefers</em> collapse</h2>
    <p>The marginal likelihood can be explained two ways, near-degenerate in accuracy:</p>
    <div class="twoway">
      <div class="tw"><p><b>(a) one topic</b>, with averaged transitions over the mixture.</p></div>
      <div class="tw"><p><b>(b) two topics</b>, each specialized to its clause type.</p></div>
    </div>
    <p>The latent partition is <strong>non-identifiable</strong> without an inductive bias. And the complexity term \(\mathrm{KL}[q\,\Vert\,p]\) <strong>rewards the simpler, topic-agnostic model</strong>: fewer effective states, lower KL. Bayesian Occam actively pulls toward <em>not using</em> \(z\).</p>
    <p class="muted">This is the same phenomenon as <strong>posterior collapse</strong> in variational autoencoders: the latent goes unused because ignoring it costs almost nothing in accuracy and saves complexity.</p>

    <h2 id="o3"><span class="nm">3</span>The EM chicken-and-egg</h2>
    <p>To infer \(q(z)\) you need topic-differentiated \(B\); to learn differentiated \(B\) you need an informative \(q(z)\). Symmetric init gives no bootstrap, and variational EM only finds <strong>local</strong> optima. The "use the latent" basin and the "ignore the latent" basin are separated — and you start in the second one.</p>
    <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 13</div><p>Even with the topic <em>teacher-forced during training</em>, at test the inferred topic returned to <code>[0.5, 0.5]</code> and binding failed — the emission \(A\) is topic-independent, so the subject has no direct evidential pathway to move \(q(z)\).</p></div>

    <h2 id="binding"><span class="nm"></span>The separate sub-problem: long-range binding</h2>
    <p>Even granting a topic, the dependency "<strong>sky</strong> … is <strong>blue</strong>" spans five-plus steps. The filtering posterior is Markov, so it <em>forgets</em>: by "is", every trace of "sky" has been squeezed through one belief.</p>
    <div class="eq">$$q(s_t) \propto p(o_t\mid s_t)\sum_{s_{t-1}} p(s_t\mid s_{t-1})\,q(s_{t-1})$$</div>
    <p>Only a dedicated slow factor, held with high precision, survives — but learning that persistence-precision again presupposes the topic is already informative.</p>
    <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 9</div><p><code>"sky is " → "green"</code> and <code>"grass is " → "green"</code>: a fixed-order Markov model cannot bind across a span longer than its order — at <em>any</em> state count (Exp 4: more states did not help — capacity ≠ memory).</p></div>

    <h2 id="why"><span class="nm"></span>What this is, and why it's open</h2>
    <p>It is <strong>unsupervised structure learning</strong>: discovering <em>which</em> latent variables to posit — how many, at what timescale — from data alone, by free-energy minimization. Mathematically it is the conjunction of:</p>
    <p class="muted" style="margin:4px 0">— a non-convex objective with a dominant uninformative-latent basin;<br>— non-identifiability of latents without inductive bias;<br>— a complexity term that prefers collapsing the latent;<br>— long-range credit assignment under Markov forgetting.</p>
    <p>There is <strong>no general, reliable algorithm</strong> that solves this by the free-energy principle alone, unsupervised. It is the same wall that makes from-scratch deep latent-variable learning hard everywhere.</p>

    <h2 id="fixes"><span class="nm"></span>What actually breaks the symmetry</h2>
    <table class="ftable"><tbody>
      <tr><th>Inductive bias</th><th>What it does, mathematically</th></tr>
      <tr><td>KL annealing / β-warmup</td><td>Down-weights the complexity term early, so the latent is <em>used</em> before Occam prunes it.</td></tr>
      <tr><td>Asymmetric init / perturbation</td><td>Seeds a fluctuation large enough to be amplified rather than smoothed away.</td></tr>
      <tr><td>Structure learning + model reduction</td><td>Grows / prunes latents instead of fixing \(K\) — searches model space, not just parameters.</td></tr>
      <tr><td>Precision / attention</td><td>Protects the slow factor's belief from Markov forgetting → enables long-range holding.</td></tr>
      <tr><td>Grounding signal</td><td>Makes \(z\) <em>identifiable</em>: a cue tied to the latent gives the gradient a foothold.</td></tr>
    </tbody></table>
    <div class="obs good"><div class="ol"><span class="dt"></span>observed — the grounded path works · Exp 14</div><p>An arbitrary cue acquired valence purely by co-occurring with the agent's own low-free-energy states — <code>P(next | …a) = 3.04 bits</code> vs <code>4.79 bits</code> for the surprising cue. No labels. Where the symmetric path stalls, the grounded path crystallizes — exactly as the math predicts.</p></div>

    <h2 id="crux"><span class="nm"></span>Why this is the crux of the moonshot</h2>
    <p>An "opinion" is a learned latent disposition. For one to <strong>emerge, never pre-trained</strong>, the system must perform exactly this unsupervised abstraction discovery — and the mathematics says it will not crystallize from symmetry; <em>it needs something to condense around</em>. That is not a dead end. It is a precise design constraint:</p>
    <div class="callout"><p>The path to emergent, non-pre-trained cognition is <strong>grounding plus structure-learning inductive biases</strong> — not pure self-organization from nothing. Every result that worked came from giving the latent a foothold. Every result that stalled was the symmetric, foothold-free case.</p></div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;margin:34px 0 10px">
      <a class="btn btn-primary" href="journey.html">See it play out in the journey →</a>
      <a class="btn btn-ghost" href="https://github.com/Mirrorad1/active_monkey/blob/main/RESEARCH.md" target="_blank" rel="noopener">The formal treatment (RESEARCH.md)</a>
    </div>
  </div>
`;

function OpenProblem(){
  const [t,setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ applyTweaks(t); },[t]);
  useEffect(()=>{
    const id = setInterval(()=>{
      if(window.MathJax && window.MathJax.typesetPromise){
        clearInterval(id);
        window.MathJax.typesetPromise([document.getElementById('op-body')]);
      }
    },120);
    return ()=>clearInterval(id);
  },[]);

  return (
    <>
      <Nav active="open"/>
      <div id="op-body" dangerouslySetInnerHTML={{__html: ARTICLE}}></div>
      <Footer/>
      <TweaksPanel>
        <TweakSection label="Palette"/>
        <TweakRadio label="System" value={t.palette} options={["growth","compass","ember"]} onChange={v=>setTweak('palette',v)}/>
        <TweakSection label="Type & texture"/>
        <TweakRadio label="Fonts" value={t.fontPair} options={["editorial","grotesk"]} onChange={v=>setTweak('fontPair',v)}/>
        <TweakToggle label="Graph paper" value={t.gridPaper} onChange={v=>setTweak('gridPaper',v)}/>
      </TweaksPanel>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<OpenProblem/>);
</script>
