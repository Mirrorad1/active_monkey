  <header class="op-head op">
    <div class="kicker slate">active_monkey · research note</div>
    <h1 class="h-display">The open problem, precisely.</h1>
    <p class="sub">Why a free-energy agent won't grow a concept on its own from a bare symbol stream — exactly where the mathematics stops, and how an embodied pivot got around it.</p>
    <p class="note">The original goal was a discrete active-inference agent that learns language and forms dispositions <em>from scratch</em> from a symbol stream. That hit a precisely-shaped wall (tabs 1–2). The project then pivoted to embodied, bottom-up emergence, which <em>circumvents</em> the wall by giving the latent a foothold (tab 3) — while the deepest version of the wall still stands (tab 4).</p>

const TAB1_HTML = String.raw`
<div id="panel-tab1" class="op-panel active op">
  <p class="op-lead">We are asking the model to discover, <strong>unsupervised</strong>, a latent variable it was never given — a "topic" / concept \(z\) — purely by minimizing free energy. That is the crux, and it is genuinely hard.</p>

  <h2 id="model"><span class="nm"></span>The model</h2>
  <p>A hierarchical active-inference model: a slow latent \(z\) (topic, near-identity dynamics so it persists), a fast latent \(s_t\) (character context), discrete emissions \(o_t\), with Dirichlet priors on the parameters \(A,B\). The two-timescale structure — slow \(z\) over fast \(s\) — follows the hierarchical generative model of Friston et al.<sup class="cite"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7758713/" target="_blank" rel="noopener">[1]</a></sup> and its deep temporal nesting.<sup class="cite"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5998386/" target="_blank" rel="noopener">[2]</a></sup></p>
  <div class="eq">$$p(o_{1:T}, s_{1:T}, z, A, B) = p(z)\,p(A)\,p(B)\prod_{t} \underbrace{p(o_t \mid s_t; A)}_{\text{emission}}\;\underbrace{p(s_t \mid s_{t-1}, z; B)}_{\text{topic-conditioned transition}}$$</div>
  <p>We minimize variational free energy over a mean-field posterior \(q(z)\,q(s_{1:T})\,q(A)\,q(B)\):</p>
  <div class="eq">$$F = \mathbb{E}_q[\ln q - \ln p] = \underbrace{-\,\mathbb{E}_q[\ln p(o\mid s,A)]}_{\text{inaccuracy (surprise)}} + \underbrace{\mathrm{KL}[q\,\Vert\,p]}_{\text{complexity}}$$</div>
  <p class="eqcap">At the optimum the per-step free energy equals the predictive surprise — the bits/char the agent literally feels.</p>

  <div class="callout">
    <div class="tag">the open problem in one sentence</div>
    <p><strong>This objective has a dominant fixed point at which the latent \(z\) is useless — and nothing in the dynamics pushes the system off it.</strong> Four exact reasons, plus a separate long-range sub-problem (see tab 2).</p>
  </div>

  <div class="op-refs">
    <div class="refs-label">References</div>
    <ol>
      <li>Friston, Parr, de Vries et al., "Generative models, linguistic communication and active inference", <em>Neurosci. Biobehav. Rev.</em> 2020 — <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7758713/" target="_blank" rel="noopener">pmc.ncbi.nlm.nih.gov/articles/PMC7758713/</a></li>
      <li>Friston et al., "Deep temporal models and active inference", 2018 — <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5998386/" target="_blank" rel="noopener">pmc.ncbi.nlm.nih.gov/articles/PMC5998386/</a></li>
    </ol>
  </div>
</div>
`;

const TAB2_HTML = String.raw`
<div id="panel-tab2" class="op-panel op">
  <h2 id="o1"><span class="nm">1</span>A symmetric saddle — no gradient to break the symmetry</h2>
  <p>If \(B\) is symmetric in \(z\) (all topics identical at initialization), then \(q(z{=}k)=1/K\) is stationary and the first-order force driving topics to specialize is <em>exactly zero</em>:</p>
  <div class="eq">$$\left.\frac{\partial F}{\partial(\text{topic differentiation})}\right|_{\text{symmetric}} = 0$$</div>
  <p>Formally this is a <strong>permutation-symmetric saddle</strong>, not a trap: the objective is invariant under relabeling the topics, so the fully-symmetric configuration is a stationary point of \(F\) with <em>zero first-order force</em> toward differentiation. It has unstable directions — but they are not <em>excited</em> by a symmetric initialization, and the mean-field posterior damps the small fluctuations that would otherwise grow. So the system sits at the saddle indefinitely unless something external perturbs it along an unstable direction (asymmetric init, annealing, or grounding — see tab 3). 'No gradient to break the symmetry' means exactly this: the escape directions exist but receive no push.<sup class="cite"><a href="https://arxiv.org/abs/1511.06349" target="_blank" rel="noopener">[1]</a></sup></p>
  <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 12</div><p><code>sky is → "s gree"</code> &nbsp; <code>grass is → "s gree"</code> &nbsp; topic belief stayed <code>[0.5, 0.5]</code> the entire run. The latent never differentiated.</p></div>

  <h2 id="o2"><span class="nm">2</span>Non-identifiability — and complexity <em>prefers</em> collapse</h2>
  <p>The marginal likelihood can be explained two ways, near-degenerate in accuracy:</p>
  <div class="twoway">
    <div class="tw"><p><b>(a) one topic</b>, with averaged transitions over the mixture.</p></div>
    <div class="tw"><p><b>(b) two topics</b>, each specialized to its clause type.</p></div>
  </div>
  <p>The latent partition is <strong>non-identifiable</strong> without an inductive bias. And the complexity term \(\mathrm{KL}[q\,\Vert\,p]\) <strong>rewards the simpler, topic-agnostic model</strong>: fewer effective states, lower KL. Bayesian Occam actively pulls toward <em>not using</em> \(z\).</p>
  <p class="muted">This is the same phenomenon as <strong>posterior collapse</strong> in variational autoencoders: the latent goes unused because ignoring it costs almost nothing in accuracy and saves complexity.<sup class="cite"><a href="https://arxiv.org/abs/1511.06349" target="_blank" rel="noopener">[1]</a></sup></p>

  <h2 id="o3"><span class="nm">3</span>The EM chicken-and-egg</h2>
  <p>To infer \(q(z)\) you need topic-differentiated \(B\); to learn differentiated \(B\) you need an informative \(q(z)\). Symmetric init gives no bootstrap, and variational EM only finds <strong>local</strong> optima. The "use the latent" basin and the "ignore the latent" basin are separated — and you start in the second one.</p>
  <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 13</div><p>Even with the topic <em>teacher-forced during training</em>, at test the inferred topic returned to <code>[0.5, 0.5]</code> and binding failed — the emission \(A\) is topic-independent, so the subject has no direct evidential pathway to move \(q(z)\).</p></div>

  <h2 id="o4"><span class="nm">4</span>Mean-field inference severs the evidence</h2>
  <p>Even handed perfectly differentiated topic-transitions, the topic never updates. The cause is the inference factorization itself. A mean-field posterior assumes topic and characters are independent: \(q(z,s_{1:T})\approx q(z)\,\prod_t q(s_t)\). But the only evidence that a character sequence implies a particular topic lives in the <em>joint</em> \(q(z,s)\) — in the cross-factor correlations. Factorizing them apart deletes the message 'this sequence ⇒ topic \(z\)' before it can reach \(q(z)\).<sup class="cite"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5998386/" target="_blank" rel="noopener">[2]</a></sup><sup class="cite"><a href="https://www.sciencedirect.com/science/article/pii/S037015732300203X" target="_blank" rel="noopener">[3]</a></sup></p>
  <div class="eq">$$q(z,s_{1:T}) \;\approx\; q(z)\,\textstyle\prod_t q(s_t)\quad\Rightarrow\quad \underbrace{\text{evidence in }\mathrm{Cov}_q(z,s)}_{\text{severed}}$$</div>
  <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 16</div><p>Topic stayed <code>[0.5,0.5]</code> EVEN WITH perfectly differentiated transitions; the transition-only evidence cannot reach \(q(z)\) under mean-field.</p></div>
  <p>The fix this implies — and it mirrors biology — is to make the concept enter through the <em>emission</em>: ground it in what the agent directly senses, so observations move \(q(z)\) directly. That is the door to tab 3.</p>

  <h2 id="binding"><span class="nm"></span>The separate sub-problem: long-range binding</h2>
  <p>Even granting a topic, the dependency "<strong>sky</strong> … is <strong>blue</strong>" spans five-plus steps. The filtering posterior is Markov, so it <em>forgets</em>: by "is", every trace of "sky" has been squeezed through one belief.</p>
  <div class="eq">$$q(s_t) \propto p(o_t\mid s_t)\sum_{s_{t-1}} p(s_t\mid s_{t-1})\,q(s_{t-1})$$</div>
  <p>Only a dedicated slow factor, held with high precision, survives — but learning that persistence-precision again presupposes the topic is already informative.</p>
  <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 9</div><p><code>"sky is " → "green"</code> and <code>"grass is " → "green"</code>: a fixed-order Markov model cannot bind across a span longer than its order — at <em>any</em> state count (Exp 4: more states did not help — capacity ≠ memory).</p></div>

  <h2 id="why"><span class="nm"></span>What this is, and why it's open</h2>
  <p>It is <strong>unsupervised structure learning</strong>: discovering <em>which</em> latent variables to posit — how many, at what timescale — from data alone, by free-energy minimization. Mathematically it is the conjunction of:</p>
  <p class="muted" style="margin:4px 0">— a non-convex objective with a dominant uninformative-latent basin;<br>— non-identifiability of latents without inductive bias;<br>— a complexity term that prefers collapsing the latent;<br>— mean-field factorization that severs transition-only evidence from the latent;<br>— long-range credit assignment under Markov forgetting.</p>
  <p>There is <strong>no general, reliable algorithm</strong> that solves this by the free-energy principle alone, unsupervised. It is the same wall that makes from-scratch deep latent-variable learning hard everywhere.</p>

  <div class="op-refs">
    <div class="refs-label">References</div>
    <ol>
      <li>Bowman et al., "Generating Sentences from a Continuous Space" (posterior collapse), 2016 — <a href="https://arxiv.org/abs/1511.06349" target="_blank" rel="noopener">arxiv.org/abs/1511.06349</a></li>
      <li>Friston et al., "Deep temporal models and active inference", 2018 — <a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC5998386/" target="_blank" rel="noopener">pmc.ncbi.nlm.nih.gov/articles/PMC5998386/</a></li>
      <li>Friston, "The free energy principle made simpler but not too simple", 2023 — <a href="https://www.sciencedirect.com/science/article/pii/S037015732300203X" target="_blank" rel="noopener">sciencedirect.com/science/article/pii/S037015732300203X</a></li>
    </ol>
  </div>
</div>
`;

const TAB3_HTML = String.raw`
<div id="panel-tab3" class="op-panel op">
  <p class="op-lead">None of the four obstacles is a theorem that the concept <em>cannot</em> form — each says it won't form <strong>from symmetry alone</strong>. Every one names its own escape: give the latent a foothold. The project's pivot did exactly that, by lowering the bar from 'language from a symbol stream' to 'a place sense from an embodied life' — and the wall gave way.</p>

  <h2><span class="nm"></span>Each obstacle, and what dissolved it</h2>
  <table class="ftable"><tbody>
    <tr><th>Obstacle</th><th>Foothold that dissolves it</th><th>Experiment</th></tr>
    <tr>
      <td>1 · Symmetric saddle</td>
      <td>An asymmetric world + action: moving through a correlated environment supplies the perturbation along an unstable direction.</td>
      <td>Exp 17/20 — wandering breaks the symmetry a bare stream can't.</td>
    </tr>
    <tr>
      <td>2 · Non-identifiability / Occam collapse</td>
      <td>Grounding makes the latent identifiable: a percept tied to the latent gives the partition a referent, so using it now PAYS for its complexity.<sup class="cite"><a href="https://journals.plos.org/ploscompbiol/article?id=10.1371/journal.pcbi.1003094" target="_blank" rel="noopener">[1]</a></sup></td>
      <td>Exp 14 — an arbitrary cue acquires valence from the agent's own free energy.</td>
    </tr>
    <tr>
      <td>3 · EM chicken-and-egg</td>
      <td>Continuous registered experience: belief never reset, so the bootstrap accumulates across one life instead of restarting each episode.</td>
      <td>Exp 19→20 — the registration fix turned partial into clean.</td>
    </tr>
    <tr>
      <td>4 · Mean-field severs evidence</td>
      <td>The concept enters through the EMISSION: the agent SEES the cue, so observations move the latent directly — no reliance on transition-only messages.</td>
      <td>Exp 16's prescription, realized in Exp 20/24 (place/object grounded in sensing).</td>
    </tr>
  </tbody></table>

  <h2><span class="nm"></span>The math of why embodiment helps</h2>
  <p>A bare symbol stream gives the latent only a transition-statistics pathway — the one mean-field severs (Obstacle 4). An embodied agent acting in a world gets two things a stream lacks. First, its actions make successive observations <em>correlated</em> in a way that is informative about the hidden cause (its location): \(p(o_{t}\mid o_{t-1}, a_{t-1})\) is sharply structured, so the place latent has a direct emission-level pathway, not just a transition one. Second, that structure is <em>asymmetric</em> by construction — different places look and connect differently — which supplies the symmetry-breaking perturbation Obstacle 1 needs.<sup class="cite"><a href="https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0277199" target="_blank" rel="noopener">[3]</a></sup></p>

  <div class="callout">
    <div class="tag">the recipe, stated as the math fix</div>
    <p><strong>Embodiment + grounding + continuous registered experience + ONE innate anchor.</strong> Each conjunct is one obstacle's named escape. Drop any one and the corresponding obstacle reappears.</p>
  </div>

  <div class="obs good"><div class="ol"><span class="dt"></span>observed · Exp 20</div><p>Under continuous registered experience the true place map self-organizes exactly (0.00 bits localization), where the symbolic case stalled at <code>[0.5,0.5]</code>.</p></div>

  <p>This does not <em>refute</em> the obstacles — it <em>routes around</em> them. The wall is real for the case it describes (a bare symbol stream, no foothold); the pivot wins by supplying footholds the stream lacked. The deepest form of the wall — emergence with <em>no</em> innate anchor at all — still stands (tab 4).</p>

  <div class="op-refs">
    <div class="refs-label">References</div>
    <ol>

      <li>Friston, "The free energy principle made simpler but not too simple", 2023 — <a href="https://www.sciencedirect.com/science/article/pii/S037015732300203X" target="_blank" rel="noopener">sciencedirect.com/science/article/pii/S037015732300203X</a></li>
      <li>"Structure learning enhances concept formation in synthetic active inference agents", <em>PLOS One</em> 2022 — <a href="https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0277199" target="_blank" rel="noopener">journals.plos.org/plosone/article?id=10.1371/journal.pone.0277199</a></li>

const TAB4_HTML = String.raw`
<div id="panel-tab4" class="op-panel op">
  <p class="op-lead">The pivot bought genuine ground — perception, facts, grounded wants, self-formed values, words for them. Two things it did not buy, and both are live research, not config.</p>

  <h2><span class="nm">A</span>Fully tabula-rasa structure (no innate anchor)</h2>
  <p>Embodiment breaks the symmetry only WITH an anchor: give the agent its sensory map OR its motor model, learn the other. Learning BOTH from noise collapses to a degenerate fixed point — the same identifiability wall, now embodied.<sup class="cite"><a href="https://arxiv.org/abs/2511.20321" target="_blank" rel="noopener">[1]</a></sup></p>
  <div class="obs"><div class="ol"><span class="dt"></span>observed · Exp 31</div><p>Joint A+B learning from scratch collapses; even unique sensing degenerates.</p></div>
  <p>The principled escapes are Bayesian model reduction<sup class="cite"><a href="https://arxiv.org/abs/1805.07092" target="_blank" rel="noopener">[2]</a></sup> — pruning structure rather than fixing it — and structure learning<sup class="cite"><a href="https://arxiv.org/abs/2311.10300" target="_blank" rel="noopener">[3]</a></sup> — growing and pruning latent structure instead of pre-specifying \(K\).</p>

  <h2><span class="nm">B</span>Emergent compositional grammar / language from scratch</h2>
  <p>Every strong AIF language demo hand-specifies the hierarchy; 'acquisition of language through learning deep models' is named as missing by the authors.<sup class="cite"><a href="https://pmc.ncbi.nlm.nih.gov/articles/PMC7758713/" target="_blank" rel="noopener">[4]</a></sup> The exponential cost of memory-by-state-enumeration (\(O(V^d)\); \(V^4\approx 614{,}000\)) forces factorization, sparsity, or scale-free hierarchy. The candidate path is scale-free active inference via renormalization group models (RGM).<sup class="cite"><a href="https://arxiv.org/abs/2407.20292" target="_blank" rel="noopener">[5]</a></sup><sup class="cite"><a href="https://arxiv.org/abs/2511.20321" target="_blank" rel="noopener">[1]</a></sup></p>

  <div class="callout">
    <div class="tag">the honest bottom line</div>
    <p>The discrete-AIF path is the right vehicle for legible, grounded, emergent <em>cognition</em> at small scale — the part the pivot proved. It is <strong>not</strong> the path to conversational fluency, which needs escaping discreteness or a hybrid substrate.</p>
  </div>

const PANELS_HTML = TAB1_HTML + TAB2_HTML + TAB3_HTML + TAB4_HTML;

const TAB_DEFS = [
  { id: "tab1", label: "1 · The original question" },
  { id: "tab2", label: "2 · Where the math stops" },
  { id: "tab3", label: "3 · The pivot" },
  { id: "tab4", label: "4 · The open frontier" },
];

function getInitialTab() {
  try {
    const m = window.location.hash.match(/[#&]tab=([a-z0-9]+)/);
    if (m && TAB_DEFS.find(t => t.id === m[1])) return m[1];
  } catch(e) {}
  return "tab1";
}

function OpenProblem(){
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeTab, setActiveTab] = useState(getInitialTab);

  useEffect(() => { applyTweaks(tw); }, [tw]);

  /* Typeset MathJax once after mount — all four panels are already in the DOM */
  useEffect(() => {
    const id = setInterval(() => {
      if (window.MathJax && window.MathJax.typesetPromise) {
        clearInterval(id);
        window.MathJax.typesetPromise([document.getElementById('op-panels')]);
      }
    }, 120);
    return () => clearInterval(id);
  }, []);

  /* Switch active panel via CSS class — no innerHTML re-render, no MathJax races */
  useEffect(() => {
    TAB_DEFS.forEach(({ id }) => {
      const el = document.getElementById('panel-' + id);
      if (el) {
        el.classList.toggle('active', id === activeTab);
      }
    });
    try {
      const url = new URL(window.location.href);
      url.hash = 'tab=' + activeTab;
      window.history.replaceState(null, '', url.toString());
    } catch(e) {}
  }, [activeTab]);

  /* Respond to browser back/forward */
  useEffect(() => {
    const onHash = () => setActiveTab(getInitialTab());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  return (
    <>
      <Nav active="open"/>
      <div dangerouslySetInnerHTML={{__html: HEADER_HTML}}></div>
      <div className="op-tabs">
        {TAB_DEFS.map(({ id, label }) => (
          <button
            key={id}
            className={"op-tab" + (activeTab === id ? " active" : "")}
            onClick={() => setActiveTab(id)}
          >{label}</button>
        ))}
      </div>
      <div id="op-panels" dangerouslySetInnerHTML={{__html: PANELS_HTML}}></div>
      <Footer/>
      <TweaksPanel>
        <TweakSection label="Palette"/>
        <TweakRadio label="System" value={tw.palette} options={["growth","compass","ember"]} onChange={v => setTweak('palette', v)}/>
        <TweakSection label="Type & texture"/>
        <TweakRadio label="Fonts" value={tw.fontPair} options={["editorial","grotesk"]} onChange={v => setTweak('fontPair', v)}/>
        <TweakToggle label="Graph paper" value={tw.gridPaper} onChange={v => setTweak('gridPaper', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<OpenProblem/>);
</script>
</body>
