<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>active_monkey — understanding the world from surprise alone</title>
<meta name="description" content="An autonomous research log: an active-inference agent that learns from scratch using nothing but its own surprise. 35 experiments, honest results, one little mind coming online.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/monkey-32.png">
<link rel="icon" type="image/png" sizes="180x180" href="assets/monkey-180.png">
<link rel="apple-touch-icon" href="assets/monkey-180.png">
<meta property="og:title" content="active_monkey — understanding the world from surprise alone">
<meta property="og:description" content="An autonomous active-inference agent learns from scratch with no labels, rewards, or pretraining — and forms opinions of its own.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mirrorad1.github.io/active_monkey/">
<meta property="og:image" content="https://mirrorad1.github.io/active_monkey/assets/monkey-512.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="am.css?v=2">
<style>
  /* ---------- hero ---------- */
  .hero{padding:54px 0 24px;}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:end;}
  @media(max-width:860px){.hero-grid{grid-template-columns:1fr;gap:30px;}}
  .hero h1{font-size:clamp(34px,5vw,58px);margin:16px 0 0;}
  .hero .lead{margin-top:22px;max-width:52ch;}
  .hero .lead b{color:var(--ink);font-weight:500;}
  .hero-cta{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap;}
  .hero-side{display:flex;flex-direction:column;gap:18px;}
  .hero-plot{border:1px solid var(--ink);background:rgba(255,255,255,.45);padding:15px 17px 9px;}
  .hero-plot .ph{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);margin-bottom:4px;}
  .hero-plot .pv{display:flex;justify-content:space-between;font-family:var(--serif);font-size:13px;margin-top:2px;}
  .hero-plot .pv .from{color:var(--ink-2);} .hero-plot .pv .to{color:var(--accent);}
  .hero-stats{display:flex;gap:26px;margin-top:30px;flex-wrap:wrap;padding-top:24px;border-top:1px solid var(--line);}

  /* section scaffolding */
  section{padding:46px 0;}
  .sec-head{margin-bottom:34px;max-width:62ch;}
  .sec-head h2{font-size:clamp(26px,3.4vw,38px);margin:12px 0 0;}
  .sec-head p{margin:16px 0 0;color:var(--ink-2);font-family:var(--serif);font-size:17px;line-height:1.55;}

  /* ---------- three lenses ---------- */
  .lenses{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);}
  @media(max-width:760px){.lenses{grid-template-columns:1fr;}}
  .lens{padding:24px 22px 26px;border-right:1px solid var(--line);}
  .lens:last-child{border-right:none;}
  @media(max-width:760px){.lens{border-right:none;border-bottom:1px solid var(--line);}.lens:last-child{border-bottom:none;}}
  .lens .who{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .lens .who span{color:var(--ink-3);font-weight:400;}
  .lens h3{font-family:var(--serif);font-size:21px;font-weight:500;margin:14px 0 8px;letter-spacing:-.01em;}
  .lens p{margin:0;font-size:13px;color:var(--ink-2);line-height:1.55;}

  /* ---------- how it works ---------- */
  .how{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);}
  @media(max-width:760px){.how{grid-template-columns:1fr;}}
  .how .col{padding:24px 24px 26px;border-right:1px solid var(--line);}
  .how .col:last-child{border-right:none;}
  @media(max-width:760px){.how .col{border-right:none;border-bottom:1px solid var(--line);}.how .col:last-child{border-bottom:none;}}
  .how .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;}
  .how .col.subject .lab{color:var(--accent);}
  .how h3{font-family:var(--serif);font-size:21px;font-weight:500;margin:12px 0 10px;letter-spacing:-.01em;}
  .how p{margin:0;font-size:13.5px;color:var(--ink-2);line-height:1.6;}
  .how-flow{margin-top:16px;border:1px solid var(--line);background:var(--paper-2);padding:15px 20px;}
  .how-flow .fl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px;}
  .how-flow .steps{font-family:var(--mono);font-size:12.5px;color:var(--ink);line-height:1.95;}
  .how-flow .steps .ar{color:var(--accent);padding:0 2px;}
  .how-note{margin-top:16px;border:1px solid var(--ink);background:var(--paper-2);padding:20px 22px;}
  .how-note p{margin:0;font-size:15px;line-height:1.55;color:var(--ink);}
  .how-note b{color:var(--accent);font-weight:600;}

  /* ---------- the climb ---------- */
  .climb{position:relative;padding-left:34px;}
  .climb::before{content:"";position:absolute;left:9px;top:8px;bottom:34px;width:2px;background:linear-gradient(var(--accent),var(--line));}
  .act{position:relative;border-top:1px solid var(--line);padding:22px 0;display:grid;grid-template-columns:54px 1fr auto;gap:20px;align-items:start;text-decoration:none;color:inherit;transition:background .15s;}
  .act:hover{background:rgba(255,255,255,.4);}
  .act::before{content:"";position:absolute;left:-29.5px;top:27px;width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid var(--paper);}
  .act .rn{font-family:var(--serif);font-style:italic;font-size:30px;color:var(--ink);line-height:1;padding-top:2px;}
  .act .q{font-family:var(--serif);font-size:23px;font-weight:500;letter-spacing:-.01em;margin:0;line-height:1.12;}
  .act .q em{font-style:italic;color:var(--accent);}
  .act .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px;}
  .act .sm{font-size:12.5px;color:var(--ink-2);margin:8px 0 0;max-width:54ch;line-height:1.5;}
  .act .dots{display:flex;gap:4px;margin-top:11px;flex-wrap:wrap;}
  .act .dots i{width:8px;height:8px;border-radius:50%;display:block;}
  .act .meta{text-align:right;font-size:11px;color:var(--ink-2);white-space:nowrap;padding-top:4px;}
  .act .meta b{font-family:var(--serif);font-size:25px;font-weight:500;color:var(--ink);display:block;line-height:1;}
  .act .go{font-size:11px;color:var(--accent);margin-top:10px;opacity:0;transition:opacity .15s;}
  .act:hover .go{opacity:1;}

  /* reveal */
  .rv{opacity:0;transform:translateY(14px);transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.2,1);}
  .rv.in{opacity:1;transform:none;}
  body[data-motion="off"] .rv{opacity:1;transform:none;}

  /* ---------- takeaways ---------- */
  .takes{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);}
  @media(max-width:820px){.takes{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:520px){.takes{grid-template-columns:1fr;}}
  .take{background:var(--paper);padding:22px 20px 24px;}
  .take .n{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.1em;font-weight:600;}
  .take h3{font-family:var(--serif);font-size:19px;font-weight:500;margin:12px 0 8px;letter-spacing:-.01em;}
  .take p{margin:0;font-size:12.5px;color:var(--ink-2);line-height:1.55;}

  /* ---------- the loop ---------- */
  .loop{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:760px){.loop{grid-template-columns:repeat(2,1fr);}}
  .lp{border:1px solid var(--line);background:rgba(255,255,255,.35);padding:18px 16px;position:relative;}
  .lp .c{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
  .lp h4{font-family:var(--serif);font-size:18px;font-weight:500;margin:8px 0 7px;}
  .lp p{margin:0;font-size:12px;color:var(--ink-2);line-height:1.5;}
  .lp .arr{position:absolute;right:-11px;top:50%;transform:translateY(-50%);color:var(--accent);font-size:14px;z-index:2;}
  @media(max-width:760px){.lp .arr{display:none;}}

  /* ---------- deep dive cta ---------- */
  .dd{border:1px solid var(--ink);background:var(--paper-2);padding:34px 32px;display:grid;grid-template-columns:1fr auto;gap:28px;align-items:center;}
  @media(max-width:720px){.dd{grid-template-columns:1fr;}}
  .dd h2{font-family:var(--serif);font-size:27px;font-weight:500;margin:0;letter-spacing:-.01em;line-height:1.1;}
  .dd p{margin:12px 0 0;color:var(--ink-2);font-size:14px;max-width:54ch;line-height:1.55;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="experiments-data.js?v=2"></script>
<script src="am-live.js?v=2"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=2"></script>
<script type="text/babel" src="am-shared.jsx?v=2"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "growth",
  "fontPair": "editorial",
  "gridPaper": true,
  "motion": true
}/*EDITMODE-END*/;

function Reveal({children, delay=0, tag="div", className=""}){
  const [ref,seen] = useInView();
  const Tag = tag;
  return <Tag ref={ref} className={"rv "+(seen?"in ":"")+className} style={{transitionDelay:(seen?delay:0)+"ms"}}>{children}</Tag>;
}

/* per-act stats */
function actStats(id, list){
  const xs = (list||AM_EXPERIMENTS).filter(e=>e.chapter===id);
  return { all:xs, win:xs.filter(e=>e.kind==="win").length, wall:xs.filter(e=>e.kind==="wall").length, partial:xs.filter(e=>e.kind==="partial").length };
}
const ACT_SUMMARY = {
  language:"From a machine that barely echoes letters to one that won't grow a concept from nothing — and the discovery that depth, not capacity, is the lever.",
  valence:"How a symbol becomes 'good' with no labels: valence grounds in the agent's own surprise, and it learns to act to feel understood.",
  embodiment:"Give it a body. Place cells self-organize, it learns where it is, and it plans far enough ahead to reach what it wants.",
  opinion:"Two identical creatures, raised in different worlds, come to value different things — and act on opinions that are entirely their own.",
  frontier:"The honest boundary of 'from scratch', abstraction that scales, and a runnable demo where you ask it, in words, what it thinks.",
};

function Hero({tally, status}){
  const [ref,seen] = useInView({threshold:.4});
  const total = useCountUp(tally.total, seen, 1000);
  const wins  = useCountUp(tally.win, seen, 1200);
  const walls = useCountUp(tally.wall, seen, 1300);
  return (
    <header className="hero" ref={ref}>
      <div className="wrap hero-grid">
        <div>
          <div className="kicker">An autonomous research log · active inference</div>
          <h1 className="h-display">Teaching a machine to understand the world from <em>surprise</em> alone.</h1>
          <p className="lead">No rewards. Nothing pretrained. Word-labels only ever taught — every value and concept self-formed. Just an agent that minimizes its own <b>free energy</b> — the gap between what it predicts and what it senses — and slowly builds a little mind that <b>perceives, learns facts, wants things, and acts.</b></p>
          <div className="hero-cta">
            <a className="btn btn-primary" href="journey.html">Follow the journey →</a>
            <a className="btn btn-ghost" href="open_problem.html">The open problem</a>
          </div>
          <div className="hero-stats">
            <div className="stat"><b className="tabnum">{total}</b><span>experiments run</span></div>
            <div className="stat win"><b className="tabnum">{wins}</b><span>breakthroughs</span></div>
            <div className="stat"><b className="tabnum">{walls}</b><span>honest walls</span></div>
          </div>
        </div>
        <div className="hero-side">
          <img className="hero-monkey" src="assets/monkey-512.png" alt="active_monkey mascot" width="160" height="160"/>
          <SyncChip status={status} count={tally.total}/>
          <div className="hero-plot">
            <div className="ph"><span>Surprise · bits / char</span><span>logged readings · Exp 1 &amp; Exp 3</span></div>
            <SurprisePlot series={AM_SURPRISE} height={132} eager={true}/>
            <div className="pv"><span className="from">Exp 1: 4.81→4.00 held-out</span><span className="to">Exp 3: 3.38→1.61 'mirro'</span></div>
          </div>
        </div>
      </div>
    </header>
  );
}

function Lenses(){
  return (
    <section id="idea">
      <div className="wrap">
        <Reveal className="sec-head">
          <div className="kicker">The big idea</div>
          <h2 className="h-section">One principle, three lenses.</h2>
          <p>The whole project rides on a single bet from theoretical neuroscience: a mind is just a thing that tries to <em>not be surprised</em>. Perception, learning, wanting, acting — all of it falls out of minimizing free energy. Three thinkers keep it honest.</p>
        </Reveal>
        <Reveal className="lenses" delay={80}>
          {AM_LENSES.map((l,i)=>(
            <div className="lens" key={i}>
              <div className="who">{l.who} <span>· {l.lens}</span></div>
              <h3>{l.title}</h3>
              <p>{l.body}</p>
            </div>
          ))}
        </Reveal>
      </div>
    </section>
  );
}

function HowItWorks(){
  return (
    <section id="how">
      <div className="wrap">
        <Reveal className="sec-head">
          <div className="kicker">How it actually works</div>
          <h2 className="h-section">Wait, is this just an LLM?</h2>
          <p>No. The language model here is the scientist, not the subject. It runs the lab. The thing actually learning is something much smaller and stranger.</p>
        </Reveal>
        <Reveal className="how" delay={60}>
          <div className="col">
            <div className="lab">The scaffolding</div>
            <h3>An LLM running the lab</h3>
            <p>An autonomous agent (yes, an LLM) does the science. It poses a hypothesis, writes the experiment, runs it, reads the result, and notes what happened. Then it goes again, on its own, without stopping. It is the researcher, not the mind being studied.</p>
          </div>
          <div className="col subject">
            <div className="lab">The subject</div>
            <h3>A mind built from math</h3>
            <p>What it studies is a tiny active inference agent. There is no language model inside it, and nothing pretrained. The embodied creature gets no dataset — just a small generative model dropped into a world, updating itself to be less surprised by what it senses. (The early language experiments streamed a small text corpus as sensory input; the embodied creature that followed does not.) Everything it comes to know, it built from its own experience.</p>
          </div>
        </Reveal>
        <Reveal className="how-flow" delay={100}>
          <div className="fl">each experiment, start to finish</div>
          <div className="steps">a hypothesis <span className="ar">→</span> build the agent <span className="ar">→</span> drop it in a tiny world <span className="ar">→</span> measure its surprise <span className="ar">→</span> keep what lowers it <span className="ar">→</span> log it honestly <span className="ar">→</span> again</div>
        </Reveal>
        <Reveal className="how-note" delay={120}>
          <p>So when you watch it learn, that isn't the language model talking. It is a little mind made of math, figuring out its world from nothing. The LLM just makes it possible to keep running these experiments without me babysitting every one.</p>
        </Reveal>
      </div>
    </section>
  );
}

function Climb({exps}){
  return (
    <section id="climb">
      <div className="wrap">
        <Reveal className="sec-head">
          <div className="kicker">The climb · five acts</div>
          <h2 className="h-section">A little mind, coming online.</h2>
          <p>Every experiment is one hypothesis and its honest result. They read as an ascent — each act a question the agent had to answer before it could climb to the next. The log is append-only, so it keeps growing.</p>
        </Reveal>
        <div className="climb">
          {AM_CHAPTERS.map((ch,i)=>{
            const s = actStats(ch.id, exps);
            return (
              <Reveal key={ch.id} delay={i*60}>
                <a className="act" href={`journey.html#act-${ch.id}`}>
                  <div className="rn">{ch.act}</div>
                  <div>
                    <div className="lbl">{ch.label}</div>
                    <p className="q">{ch.question}</p>
                    <p className="sm">{ACT_SUMMARY[ch.id]}</p>
                    <div className="dots">
                      {s.all.map((e,j)=><i key={j} style={{background:e.kind==="win"?"var(--win)":e.kind==="partial"?"var(--partial)":"transparent",border:e.kind==="wall"?"1.6px solid var(--wall)":"none"}}></i>)}
                    </div>
                  </div>
                  <div className="meta">
                    <b className="tabnum">{String(s.all.length).padStart(2,"0")}</b>
                    experiments
                    <div className="go">explore act →</div>
                  </div>
                </a>
              </Reveal>
            );
          })}
        </div>
      </div>
    </section>
  );
}

function Takeaways(){
  return (
    <section id="learned">
      <div className="wrap">
        <Reveal className="sec-head">
          <div className="kicker">The takeaways</div>
          <h2 className="h-section">Six things the climb taught us.</h2>
        </Reveal>
        <Reveal className="takes" delay={60}>
          {AM_TAKEAWAYS.map((t,i)=>(
            <div className="take" key={i}>
              <div className="n">{t.n}</div>
              <h3>{t.title}</h3>
              <p>{t.body}</p>
            </div>
          ))}
        </Reveal>
      </div>
    </section>
  );
}

function Loop(){
  return (
    <section id="loop">
      <div className="wrap">
        <Reveal className="sec-head">
          <div className="kicker">Under the hood</div>
          <h2 className="h-section">The loop that never stops.</h2>
          <p>It runs itself. Every cycle is the same four beats — and the world model in between only ever grows.</p>
        </Reveal>
        <Reveal className="loop" delay={60}>
          {AM_LOOP.map((l,i)=>(
            <div className="lp" key={i}>
              <div className="c">cycle · {l.n}</div>
              <h4>{l.title}</h4>
              <p>{l.body}</p>
              {i<AM_LOOP.length-1 && <span className="arr">→</span>}
            </div>
          ))}
        </Reveal>
      </div>
    </section>
  );
}

function DeepDive(){
  return (
    <section id="dd">
      <div className="wrap">
        <Reveal className="dd">
          <div>
            <div className="kicker slate">The deep dive</div>
            <h2 style={{marginTop:10}}>Why a mind won't grow a concept on its own.</h2>
            <p>The hardest wall, stated precisely in mathematics: where free-energy minimization stops, why an unsupervised "concept" refuses to crystallize — and the exact footholds that break the symmetry.</p>
          </div>
          <a className="btn btn-primary" href="open_problem.html">Read the open problem →</a>
        </Reveal>
      </div>
    </section>
  );
}

function App(){
  const [t,setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ applyTweaks(t); },[t]);
  const { exps, tally, status } = useLiveExperiments();
  return (
    <>
      <Nav active="home"/>
      <Hero tally={tally} status={status}/>
      <hr className="rule" style={{maxWidth:'var(--maxw)',margin:'0 auto'}}/>
      <Lenses/>
      <div style={{background:'var(--paper-2)'}}><HowItWorks/></div>
      <Climb exps={exps}/>
      <Takeaways/>
      <div style={{background:'var(--paper-2)'}}><Loop/></div>
      <DeepDive/>
      <Footer/>
      <TweaksPanel>
        <TweakSection label="Palette"/>
        <TweakRadio label="System" value={t.palette} options={["growth","compass","ember"]} onChange={v=>setTweak('palette',v)}/>
        <TweakSection label="Type & texture"/>
        <TweakRadio label="Fonts" value={t.fontPair} options={["editorial","grotesk"]} onChange={v=>setTweak('fontPair',v)}/>
        <TweakToggle label="Graph paper" value={t.gridPaper} onChange={v=>setTweak('gridPaper',v)}/>
        <TweakToggle label="Motion" value={t.motion} onChange={v=>setTweak('motion',v)}/>
      </TweaksPanel>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
