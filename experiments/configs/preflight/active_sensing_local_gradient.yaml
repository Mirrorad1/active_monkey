slug: active_sensing_local_gradient
description: "Phase 4 rung 3: local gradient of information_sampling_rate (active sensing) under a hidden switching mode (mode-dependent hazard, DRIFT-SUPPRESSED high-food regime)."
#
# REGIME FIXED 2026-06-14 on a DISCLOSED pilot (pilot seeds {100-104}; verdict on FRESH [50-57]).
# Key lesson baked in (the pilot's central finding):
#   - At Phase-3-parity carrying capacity (cap 50, pops ~150) the resident-vs-mutant common
#     garden is DRIFT-DOMINATED: the pure-COST perfect-percept control (cue_noise=0) fixates the
#     mutant as often as the real-info arm, so inv_frac cannot distinguish selection from drift.
#   - DRIFT SUPPRESSION: raise carrying capacity to 250 (regen 10) so pops ~950 and fixation is
#     slow; THEN read the drift-robust SELECTION SLOPE (mean_s = slope of ln(n_mut/n_res)) — drift
#     has mean_s~0, selection has consistent mean_s>0. The memory_horizon trait (Phase 3) re-tested
#     at this SAME cap-250 regime ALSO shows mean_s~0 (confirms the Phase-3 wall is not a drift
#     artifact). probe_cost 0.1 = affordable-but-real (the pure-cost control mutant loses here).
base_scenario: balanced
base_overrides:
  enable_hidden_mode: true
  enable_active_sensing: true
  mode_wrong_regen_factor: 1.0
  mode_hazard_scale: 0.6
  capacity: 250.0                # DRIFT SUPPRESSION (was 50 = drift-dominated; disclosed pilot)
  regen_rate: 10.0              # high food so pops ~950 and fixation is slow
  initial_resource: 0.7
  max_population: 30000
  mode_switch_prob: 0.05
  cue_noise: 1.0
  memory_cost_slope: 0.005
  memory_upkeep_floor: 0.0
  probe_cost: 0.1              # affordable-but-real (pure-cost control mutant loses at cap250)
  probe_n_samples: 4
  shuffle_creature_order: true
trait: information_sampling_rate
controller: null
seeds: [50, 51, 52, 53, 54, 55, 56, 57]
horizon: 1500
measurement_window: [50, 800]
output_dir: results/preflight
gates:
  - local_pairwise_gradient
  - invasion_from_rarity
  - null_guards
min_valid_seeds: 6
min_population: 80
