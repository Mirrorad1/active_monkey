<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journey — active_monkey</title>
<meta name="description" content="The experiments, told honestly — wins and walls. Sortable, filterable, dive into any one.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/monkey-32.png">
<link rel="icon" type="image/png" sizes="180x180" href="assets/monkey-180.png">
<link rel="apple-touch-icon" href="assets/monkey-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="am.css?v=2">
<style>
  /* ---------- header ---------- */
  .jhead{padding:42px 0 28px;}
  .jhead-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:end;}
  @media(max-width:880px){.jhead-grid{grid-template-columns:1fr;gap:26px;}}
  .jhead h1{font-size:clamp(30px,4.4vw,48px);margin:14px 0 0;}
  .jhead .lead{margin-top:18px;max-width:50ch;font-size:17px;}
  .jhead-side{display:flex;flex-direction:column;gap:14px;}
  .jplot{border:1px solid var(--ink);background:rgba(255,255,255,.45);padding:14px 16px 8px;}
  .jplot .ph{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);margin-bottom:4px;}
  .jcounts{display:flex;gap:24px;flex-wrap:wrap;}

  /* ---------- control bar ---------- */
  .controls{position:sticky;top:51px;z-index:30;background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(8px);border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .controls-in{max-width:var(--maxw);margin:0 auto;padding:13px 28px;display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .cgroup{display:flex;align-items:center;gap:9px;}
  .clabel{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
  .seg button{font-family:var(--mono);font-size:11px;letter-spacing:.02em;padding:6px 11px;border:none;background:transparent;color:var(--ink-2);cursor:pointer;transition:background .12s,color .12s;border-right:1px solid var(--line);}
  .seg button:last-child{border-right:none;}
  .seg button:hover{color:var(--ink);}
  .seg button.on{background:var(--accent);color:#fff;}
  .fchip{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;letter-spacing:.02em;padding:6px 11px;border:1px solid var(--line);border-radius:7px;background:transparent;color:var(--ink-2);cursor:pointer;transition:all .12s;}
  .fchip:hover{border-color:var(--ink-3);color:var(--ink);}
  .fchip.on{border-color:var(--ink);color:var(--ink);background:rgba(255,255,255,.5);}
  .fchip .ct{color:var(--ink-3);font-variant-numeric:tabular-nums;}
  .fchip.on .ct{color:var(--ink-2);}
  .spacer{flex:1;}
  .txtbtn{font-family:var(--mono);font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;letter-spacing:.02em;}
  .txtbtn:hover{text-decoration:underline;}

  /* ---------- timeline ---------- */
  .timeline{padding:30px 0 10px;position:relative;}
  .tl-inner{max-width:860px;margin:0 auto;padding:0 28px;position:relative;}
  .tl-inner::before{content:"";position:absolute;left:34px;top:6px;bottom:6px;width:2px;background:var(--line);}
  @media(max-width:560px){.tl-inner::before{left:20px;}}

  /* experiment card */
  .exp{position:relative;padding-left:60px;margin-bottom:14px;}
  @media(max-width:560px){.exp{padding-left:42px;}}
  .exp .node{position:absolute;left:27px;top:20px;width:16px;height:16px;border-radius:50%;background:var(--paper);border:3px solid var(--positive);z-index:2;}
  .exp.breakthrough .node{background:var(--break);border-color:var(--break-deep);box-shadow:0 0 0 3px rgba(176,122,0,.22);}
  .exp.positive .node{background:var(--positive);}
  .exp.wall .node{border-color:var(--wall);background:var(--paper);}
  .exp.partial .node{border-color:var(--partial);background:var(--partial);}
  .exp.win .node{background:var(--win);}   /* legacy */
  @media(max-width:560px){.exp .node{left:13px;}}
  /* breakthrough cards get a subtle gold left-border accent */
  .exp.breakthrough .card{border-left:3px solid var(--break);}
  .exp.breakthrough .card.open{border-left-color:var(--break-deep);}

  .card{border:1px solid var(--line);background:rgba(255,255,255,.4);transition:border-color .15s,box-shadow .15s,background .15s;}
  .card:hover{border-color:var(--ink-3);}
  .card.open{border-color:var(--ink);background:rgba(255,255,255,.62);box-shadow:0 6px 22px -16px rgba(40,30,10,.5);}
  .card-head{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:17px 20px;cursor:pointer;}
  @media(max-width:560px){.card-head{padding:15px 15px;gap:11px;}}
  .exp-id{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;white-space:nowrap;}
  .exp-id b{display:block;font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:500;font-style:normal;line-height:1;margin-bottom:3px;}
  .exp-main{min-width:0;}
  .exp-top{display:flex;align-items:center;gap:9px;margin-bottom:5px;flex-wrap:wrap;}
  .exp-act{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}
  .exp-title{font-family:var(--serif);font-size:18px;font-weight:500;line-height:1.18;margin:0 0 3px;letter-spacing:-.01em;}
  @media(max-width:560px){.exp-title{font-size:16px;}}
  .exp-one{font-size:12.5px;color:var(--ink-2);margin:0;line-height:1.45;}
  .exp-right{display:flex;align-items:center;gap:14px;}
  .metric{text-align:right;white-space:nowrap;}
  .metric .mv{font-family:var(--serif);font-size:15px;color:var(--ink);line-height:1.1;}
  .metric .mv .ar{color:var(--accent);}
  .metric .mu{font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);}
  @media(max-width:680px){.metric{display:none;}}
  .chev{width:24px;height:24px;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;color:var(--ink-2);font-size:13px;flex:none;transition:transform .2s,border-color .15s,background .15s;}
  .card:hover .chev{border-color:var(--ink-3);}
  .card.open .chev{transform:rotate(45deg);background:var(--accent);color:#fff;border-color:var(--accent);}

  .card-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .32s cubic-bezier(.4,0,.2,1);}
  .card.open .card-body{grid-template-rows:1fr;}
  .card-body-in{overflow:hidden;}
  .body-pad{padding:2px 20px 22px 20px;}
  @media(max-width:560px){.body-pad{padding:2px 15px 18px;}}
  .body-pad hr{border:none;border-top:1px dashed var(--line);margin:0 0 16px;}
  .dive{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--line);background:var(--paper);}
  @media(max-width:680px){.dive{grid-template-columns:1fr;}}
  .dpane{padding:15px 16px;border-right:1px solid var(--line);}
  .dpane:last-child{border-right:none;}
  @media(max-width:680px){.dpane{border-right:none;border-bottom:1px solid var(--line);}.dpane:last-child{border-bottom:none;}}
  .dpane .dl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .dpane .dl .b{width:6px;height:6px;border-radius:50%;background:var(--ink-3);}
  .dpane.r .dl .b{background:var(--accent);}
  .dpane p{margin:0;font-size:12.5px;line-height:1.55;color:var(--ink);}
  .dpane.r p{color:var(--ink);}
  .bigmetric{display:flex;align-items:baseline;gap:12px;margin-top:14px;padding-top:13px;border-top:1px dashed var(--line);}
  .bigmetric .bm{font-family:var(--serif);font-size:30px;font-weight:500;color:var(--accent);line-height:1;}
  .bigmetric .bmu{font-size:11px;color:var(--ink-2);letter-spacing:.04em;}
  .bigmetric .bmf{font-size:12px;color:var(--ink-3);}

  /* beat */
  .beat{position:relative;padding-left:60px;margin:8px 0 22px;}
  @media(max-width:560px){.beat{padding-left:42px;}}
  .beat .node{position:absolute;left:25px;top:18px;width:20px;height:20px;border-radius:50%;background:var(--accent);border:3px solid var(--paper);z-index:2;display:grid;place-items:center;color:#fff;font-size:11px;}
  @media(max-width:560px){.beat .node{left:11px;}}
  .beat-card{border:1px solid var(--ink);background:var(--paper-2);padding:20px 22px;}
  .beat-card .bl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:8px;}
  .beat-card h3{font-family:var(--serif);font-size:21px;font-weight:500;margin:0 0 9px;letter-spacing:-.01em;}
  .beat-card p{margin:0;font-size:13px;line-height:1.6;color:var(--ink-2);}

  /* act divider */
  .actdiv{position:relative;padding-left:60px;margin:30px 0 18px;}
  @media(max-width:560px){.actdiv{padding-left:42px;}}
  .actdiv .node{position:absolute;left:28px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--ink);border:3px solid var(--paper);z-index:2;}
  @media(max-width:560px){.actdiv .node{left:14px;}}
  .actdiv .rn{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--ink-2);}
  .actdiv h2{font-family:var(--serif);font-size:24px;font-weight:500;margin:2px 0 0;letter-spacing:-.01em;}
  .actdiv .q{font-size:12px;color:var(--ink-2);margin-top:3px;}

  .empty{text-align:center;color:var(--ink-2);padding:50px 0;font-size:14px;}
  .scrolltop{position:fixed;right:22px;bottom:22px;z-index:35;width:42px;height:42px;border-radius:50%;border:1px solid var(--ink);background:var(--paper);color:var(--ink);cursor:pointer;font-size:16px;opacity:0;pointer-events:none;transition:opacity .2s;display:grid;place-items:center;}
  .scrolltop.show{opacity:1;pointer-events:auto;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="experiments-data.js?v=2"></script>
<script src="am-live.js?v=2"></script>
<script type="text/babel" src="tweaks-panel.jsx?v=2"></script>
<script type="text/babel" src="am-shared.jsx?v=2"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "growth",
  "fontPair": "editorial",
  "gridPaper": true,
  "motion": true,
  "defaultExpanded": false
}/*EDITMODE-END*/;

const KIND_LABEL = { breakthrough:"breakthrough", positive:"positive", win:"positive", wall:"honest wall", partial:"partial" };
const chapterById = id => AM_CHAPTERS.find(c=>c.id===id);

const GH_RAW = "https://raw.githubusercontent.com/Mirrorad1/active_monkey/main/";
const GH_BLOB = "https://github.com/Mirrorad1/active_monkey/blob/main/";

function Metric({m, compact}){
  if(!m) return null;
  if(compact) return (
    <div className="metric">
      <div className="mv">{m.from!==undefined && <span className="from">{m.from} </span>}{m.from!==undefined && <span className="ar">→ </span>}<b>{m.to}</b></div>
      <div className="mu">{m.unit}</div>
    </div>
  );
  return (
    <div className="bigmetric">
      <span className="bm">{m.to}</span>
      <span className="bmu">{m.unit}</span>
      {m.from!==undefined && <span className="bmf">from {m.from}</span>}
    </div>
  );
}

function TraceBlock({label, path, ghPath}){
  const [open, setOpen] = useState(false);
  const [state, setState] = useState("idle"); // idle | loading | done | error
  const [text, setText] = useState("");
  const toggle = async () => {
    const next = !open;
    setOpen(next);
    if(next && state === "idle"){
      setState("loading");
      try{
        const ctrl = new AbortController();
        const to = setTimeout(()=>ctrl.abort(), 10000);
        const res = await fetch(GH_RAW + path, {signal:ctrl.signal, cache:"no-store"});
        clearTimeout(to);
        if(!res.ok) throw new Error("HTTP "+res.status);
        setText(await res.text());
        setState("done");
      }catch(err){
        setState("error");
        setText(String(err&&err.message||err));
      }
    }
  };
  return (
    <div className="trace-block">
      <div className={"trace-block-head"+(open?" open":"")} onClick={toggle}>
        <span className="tb-label">{label}</span>
        <a className="tb-gh" href={GH_BLOB+ghPath} target="_blank" rel="noopener" onClick={ev=>ev.stopPropagation()}>view on GitHub ↗</a>
        <span className="tb-chev">▶</span>
      </div>
      {open && (
        <div className="trace-pre-wrap">
          {state==="loading" && <div className="trace-loading">fetching from GitHub…</div>}
          {state==="error" && <div className="trace-error">Could not load file. <a href={GH_BLOB+ghPath} target="_blank" rel="noopener">Open directly on GitHub ↗</a><br/><small>{text}</small></div>}
          {state==="done" && <pre className="trace-pre">{text}</pre>}
        </div>
      )}
    </div>
  );
}

function TraceSection({trace}){
  if(!trace) return null;
  return (
    <div className="trace-section">
      <div className="trace-title">
        <span>TRACE IT</span>
        {trace.verified==="match" && <span className="verified-chip">re-verified ✓</span>}
        <span style={{color:"var(--ink-3)",fontWeight:400,letterSpacing:".01em",fontSize:"9px",flex:1}}>all 40 scripts reproduce their original output</span>
      </div>
      <TraceBlock
        label="Experiment script"
        path={trace.script}
        ghPath={trace.script}
      />
      <TraceBlock
        label="Original recorded output"
        path={trace.output}
        ghPath={trace.output}
      />
      <TraceBlock
        label={"Re-run 2026-06-09 (verified: output matches original)"}
        path={trace.rerun}
        ghPath={trace.rerun}
      />
    </div>
  );
}

function StoryPanel({story}){
  if(!story) return null;
  return (
    <div className="story-panel">
      <div className="story-kicker">The story so far</div>
      <p>{story}</p>
    </div>
  );
}

function ExpCard({e, open, onToggle}){
  const ch = chapterById(e.chapter);
  const kindKey = e.kind === "win" ? "positive" : e.kind; // normalise legacy "win"
  return (
    <div className={"exp "+kindKey} id={`exp-${e.n}`}>
      <span className="node"></span>
      <div className={"card"+(open?" open":"")}>
        <div className="card-head" onClick={onToggle}>
          <div className="exp-id"><b className="tabnum">{String(e.n).padStart(2,"0")}</b>EXP</div>
          <div className="exp-main">
            <div className="exp-top">
              <span className={"badge "+kindKey}><span className="d" style={{background:kindKey==="wall"?"transparent":"#fff",border:kindKey==="wall"?"1.4px solid var(--wall)":"none"}}></span>{KIND_LABEL[e.kind]||e.kind}</span>
              <span className="exp-act">{ch.act} · {ch.label}</span>
              {e.trace && e.trace.verified==="match" && <span className="verified-chip" style={{marginLeft:4}}>re-verified ✓</span>}
            </div>
            <h3 className="exp-title">{e.title}</h3>
            <p className="exp-one">{e.one}</p>
          </div>
          <div className="exp-right">
            <Metric m={e.metric} compact={true}/>
            <span className="chev">+</span>
          </div>
        </div>
        <div className="card-body"><div className="card-body-in"><div className="body-pad">
          <hr/>
          {e.story && <StoryPanel story={e.story}/>}
          <div className="dive">
            <div className="dpane"><div className="dl"><span className="b"></span>The test</div><p>{e.setup}</p></div>
            <div className="dpane"><div className="dl"><span className="b"></span>What happened</div><p>{e.result}</p></div>
            <div className="dpane r"><div className="dl"><span className="b"></span>What it means</div><p>{e.implication}</p></div>
          </div>
          <Metric m={e.metric} compact={false}/>
          <TraceSection trace={e.trace}/>
        </div></div></div>
      </div>
    </div>
  );
}

function Beat({b}){
  return (
    <div className="beat">
      <span className="node">{b.kind==="pivot"?"↯":"★"}</span>
      <div className="beat-card">
        <div className="bl">{b.label}</div>
        <h3 className="serif">{b.title}</h3>
        <p>{b.body}</p>
      </div>
    </div>
  );
}

function ActDivider({ch, count}){
  return (
    <div className="actdiv" id={`act-${ch.id}`}>
      <span className="node"></span>
      <div className="rn">Act {ch.act} · {count} experiments</div>
      <h2>{ch.label}</h2>
      <div className="q">{ch.question}</div>
    </div>
  );
}

function Journey(){
  const [t,setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ applyTweaks(t); },[t]);

  const { exps, tally, status } = useLiveExperiments();

  const [sort,setSort] = useState("newest");        // newest | oldest | outcome
  const [kind,setKind] = useState("all");           // all | breakthrough | positive | wall | partial
  const [act,setAct]   = useState("all");           // all | chapter id
  const [open,setOpen] = useState(()=>new Set());
  const [showTop,setShowTop] = useState(false);

  // honor deep links + defaultExpanded
  useEffect(()=>{
    const h = decodeURIComponent(location.hash.replace('#',''));
    if(h.startsWith('act-')){ setAct(h.slice(4)); }
  },[]);
  useEffect(()=>{
    if(t.defaultExpanded){ setOpen(new Set(exps.map(e=>e.n))); }
  },[exps]);
  useEffect(()=>{
    const onScroll=()=>setShowTop(window.scrollY>700);
    window.addEventListener('scroll',onScroll,{passive:true});
    return ()=>window.removeEventListener('scroll',onScroll);
  },[]);

  const counts = tally;

  const toggle = n => setOpen(prev=>{ const s=new Set(prev); s.has(n)?s.delete(n):s.add(n); return s; });
  const allOpen = open.size>=exps.length && exps.length>0;
  const toggleAll = ()=> setOpen(allOpen ? new Set() : new Set(exps.map(e=>e.n)));
  const actCount = id => exps.filter(e=>e.chapter===id).length;

  // build the ordered render sequence
  const sequence = useMemo(()=>{
    // normalise: treat legacy "win" as "positive" for filtering
    const normKind = e => e.kind === "win" ? "positive" : e.kind;
    let xs = exps.filter(e => (kind==="all"||normKind(e)===kind) && (act==="all"||e.chapter===act));
    const showBeats = kind==="all" && act==="all" && sort!=="outcome";
    const showActs  = act==="all" && sort!=="outcome" && kind==="all";

    if(sort==="outcome"){
      const order={breakthrough:0,positive:1,partial:2,wall:3,win:1};
      xs = [...xs].sort((a,b)=> order[a.kind]-order[b.kind] || b.n-a.n);
      return xs.map(e=>({type:"exp",e}));
    }

    // chronological (oldest-first) interleave, then reverse for newest
    let seq=[];
    let lastChapter=null;
    exps.forEach(e=>{
      if(!xs.includes(e)) { return; }
      if(showActs && e.chapter!==lastChapter){ seq.push({type:"act",ch:chapterById(e.chapter)}); lastChapter=e.chapter; }
      seq.push({type:"exp",e});
      if(showBeats){ AM_BEATS.filter(b=>b.after===e.n).forEach(b=>seq.push({type:"beat",b})); }
    });
    if(sort==="newest"){
      const expOnly = seq.filter(s=>s.type!=="act");
      expOnly.reverse();
      if(showActs){
        const out=[]; let seenAct=new Set();
        expOnly.forEach(item=>{
          if(item.type==="exp" && !seenAct.has(item.e.chapter)){ out.push({type:"act",ch:chapterById(item.e.chapter)}); seenAct.add(item.e.chapter); }
          out.push(item);
        });
        return out;
      }
      return expOnly;
    }
    return seq;
  },[sort,kind,act,exps]);

  return (
    <>
      <Nav active="journey"/>
      <header className="jhead">
        <div className="wrap jhead-grid">
          <div>
            <div className="kicker">The journey · append-only, newest first</div>
            <h1 className="h-display"><span className="tabnum">{counts.total}</span> experiments, told honestly.</h1>
            <p className="lead">Each one is a single hypothesis, the smallest possible test, and the result we actually got — failures included, because they taught the most. It reads as a climb: from a machine that can barely echo letters, to a little embodied creature whose mind quietly comes online.</p>
            <div className="jcounts" style={{marginTop:26}}>
              <div className="stat"><b className="tabnum">{counts.total}</b><span>experiments</span></div>
              <div className="stat" style={{color:"var(--break)"}}><b className="tabnum" style={{color:"var(--break)"}}>{counts.breakthrough||0}</b><span>breakthroughs</span></div>
              <div className="stat win"><b className="tabnum">{counts.positive||counts.win||0}</b><span>positives</span></div>
              <div className="stat"><b className="tabnum">{counts.wall}</b><span>walls</span></div>
              <div className="stat"><b className="tabnum">{counts.partial}</b><span>partials</span></div>
            </div>
          </div>
          <div className="jhead-side">
            <SyncChip status={status} count={counts.total}/>
            <div className="jplot">
              <div className="ph"><span>Surprise · bits / char</span><span>two separate experiments</span></div>
              <SurpriseSegments segments={AM_SURPRISE_SEGMENTS} height={104}/>
              <div style={{marginTop:'8px', fontFamily:'var(--mono)', fontSize:'10px', color:'var(--ink-3)', lineHeight:1.5, borderTop:'1px dashed var(--line)', paddingTop:'7px'}}>
                No vision, no audio — the character stream we provide is its only sense. Falling surprise is the only 'reward' it ever gets.
              </div>
            </div>
          </div>
        </div>
      </header>

      <div className="controls">
        <div className="controls-in">
          <div className="cgroup">
            <span className="clabel">Sort</span>
            <div className="seg">
              <button className={sort==="newest"?"on":""} onClick={()=>setSort("newest")}>Newest</button>
              <button className={sort==="oldest"?"on":""} onClick={()=>setSort("oldest")}>Oldest</button>
              <button className={sort==="outcome"?"on":""} onClick={()=>setSort("outcome")}>By outcome</button>
            </div>
          </div>
          <div className="cgroup">
            <span className="clabel">Show</span>
            <button className={"fchip"+(kind==="all"?" on":"")} onClick={()=>setKind("all")}>All <span className="ct">{counts.total}</span></button>
            <button className={"fchip"+(kind==="breakthrough"?" on":"")} onClick={()=>setKind("breakthrough")}><span className="dot breakthrough"></span>Breakthroughs <span className="ct">{counts.breakthrough||0}</span></button>
            <button className={"fchip"+(kind==="positive"?" on":"")} onClick={()=>setKind("positive")}><span className="dot positive"></span>Positives <span className="ct">{counts.positive||counts.win||0}</span></button>
            <button className={"fchip"+(kind==="wall"?" on":"")} onClick={()=>setKind("wall")}><span className="dot wall"></span>Walls <span className="ct">{counts.wall}</span></button>
            <button className={"fchip"+(kind==="partial"?" on":"")} onClick={()=>setKind("partial")}><span className="dot partial"></span>Partials <span className="ct">{counts.partial}</span></button>
          </div>
          <div className="spacer"></div>
          <div className="cgroup">
            <span className="clabel">Act</span>
            <select value={act} onChange={e=>setAct(e.target.value)} style={{fontFamily:'var(--mono)',fontSize:11,padding:'6px 8px',border:'1px solid var(--line)',borderRadius:7,background:'transparent',color:'var(--ink)',cursor:'pointer'}}>
              <option value="all">All acts</option>
              {AM_CHAPTERS.map(c=><option key={c.id} value={c.id}>{c.act} · {c.label}</option>)}
            </select>
          </div>
          <button className="txtbtn" onClick={toggleAll}>{allOpen?"Collapse all":"Expand all"}</button>
        </div>
      </div>

      <div className="timeline">
        <div className="tl-inner">
          {sequence.length===0 && <div className="empty">No experiments match this filter.</div>}
          {sequence.map((item,i)=>{
            if(item.type==="act") return <ActDivider key={"a"+item.ch.id} ch={item.ch} count={actCount(item.ch.id)}/>;
            if(item.type==="beat") return <Beat key={"b"+item.b.after} b={item.b}/>;
            return <ExpCard key={item.e.n} e={item.e} open={open.has(item.e.n)} onToggle={()=>toggle(item.e.n)}/>;
          })}
        </div>
      </div>

      <Footer/>
      <button className={"scrolltop"+(showTop?" show":"")} onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} aria-label="Back to top">↑</button>

      <TweaksPanel>
        <TweakSection label="Reading"/>
        <TweakToggle label="Start expanded" value={t.defaultExpanded} onChange={v=>{setTweak('defaultExpanded',v); setOpen(v?new Set(exps.map(e=>e.n)):new Set());}}/>
        <TweakSection label="Palette"/>
        <TweakRadio label="System" value={t.palette} options={["growth","compass","ember"]} onChange={v=>setTweak('palette',v)}/>
        <TweakSection label="Type & texture"/>
        <TweakRadio label="Fonts" value={t.fontPair} options={["editorial","grotesk"]} onChange={v=>setTweak('fontPair',v)}/>
        <TweakToggle label="Graph paper" value={t.gridPaper} onChange={v=>setTweak('gridPaper',v)}/>
        <TweakToggle label="Motion" value={t.motion} onChange={v=>setTweak('motion',v)}/>
      </TweaksPanel>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<Journey/>);
</script>
</body>
</html>
